name: Governance Event Emitter

on:
  push:
    branches:
      - main
      - draft/*
  workflow_dispatch:

jobs:
  emit-event:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract commit metadata
        id: meta
        run: |
          echo "commit_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "message=$(git log -1 --pretty=%B)" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Append to ledger
        run: |
          mkdir -p logs
          echo "${{ steps.meta.outputs.timestamp }}|${{ steps.meta.outputs.commit_sha }}|${{ steps.meta.outputs.message }}" >> logs/ledger.txt

      - name: Commit ledger update
        run: |
          git config user.name "meridian-bot"
          git config user.email "meridian-bot@users.noreply.github.com"
          git add logs/ledger.txt
          git commit -m "chore(events): update governance ledger" || exit 0
          git push
