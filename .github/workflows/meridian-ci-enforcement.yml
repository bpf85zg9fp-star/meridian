name: Meridian Governance CI (ENFORCEMENT MODE v2)

on:
  push:
  pull_request:

jobs:
  governance-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      # -----------------------------
      # RFQ → RIP CONTRACT VALIDATION (BLOCKING)
      # -----------------------------
      - name: RFQ → RIP contract validation
        run: |
          python scripts/validate_contract.py

      # -----------------------------
      # SCHEMA ENFORCEMENT GATE (BLOCKING)
      # -----------------------------
      - name: Schema enforcement gate
        run: |
          python scripts/validate_schemas.py

      # -----------------------------
      # RTM GRAPH ENGINE (BLOCKING)
      # -----------------------------
      - name: RTM graph engine
        run: |
          python scripts/rtm_graph.py

      # -----------------------------
      # GOVERNANCE SUMMARY
      # -----------------------------
      - name: Governance summary
        run: |
          echo "Meridian CI ENFORCEMENT MODE COMPLETE"
          echo "All gates enforced: RFQ, RIP, Schema, RTM"
          echo "Pipeline is now blocking by default"
